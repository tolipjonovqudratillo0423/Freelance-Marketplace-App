version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: freelance_marketplace
      POSTGRES_USER: tqm
      POSTGRES_PASSWORD: Alabas23
    volumes:
        - postgres_data:/var/lib/postgresql/data
    ports:
        - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tqm -d freelance_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app/Freelance_Marketplace
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
  
volumes:
  postgres_data:
  